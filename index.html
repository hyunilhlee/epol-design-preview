<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EPOL · 디자인 시안 프리뷰 (Dark / Light)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,700;1,9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --shell-bg: #0b0d12; --shell-ink: #e8eaee; --shell-mute: #8a90a0; --shell-line: #23262f; }
  html, body { background: var(--shell-bg); color: var(--shell-ink); font-family: 'Noto Sans KR','Inter',system-ui,sans-serif; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  ::selection { background: rgba(52,211,153,.35); }

  /* ===================== TOP SWITCHER ===================== */
  .topbar { position: sticky; top: 0; z-index: 100; background: rgba(11,13,18,.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--shell-line); padding: 13px clamp(16px,4vw,40px); }
  .topbar-inner { max-width: 1360px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; position: relative; }
  .brand { display: flex; align-items: baseline; gap: 10px; margin-right: auto; }
  .brand b { font-family: 'Space Grotesk',sans-serif; font-size: 18px; letter-spacing: -.02em; }
  .brand span { font-family: 'JetBrains Mono',monospace; font-size: 10.5px; color: var(--shell-mute); letter-spacing: .1em; text-transform: uppercase; }
  .dir-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .dir-tab { cursor: pointer; border: 1px solid var(--shell-line); background: #14171f; color: var(--shell-mute); padding: 9px 14px; border-radius: 10px; font-size: 12.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all .18s ease; white-space: nowrap; }
  .dir-tab .dot { width: 9px; height: 9px; border-radius: 50%; }
  .dir-tab:hover { color: #fff; border-color: #3a3f4c; transform: translateY(-1px); }
  .dir-tab.active { color: #0b0d12; background: #fff; border-color: #fff; }
  .dir-tab .num { font-family: 'JetBrains Mono',monospace; font-size: 10px; opacity: .6; }

  /* theme toggle */
  .theme-toggle { display: inline-flex; background: #14171f; border: 1px solid var(--shell-line); border-radius: 10px; padding: 3px; gap: 2px; }

  .theme-toggle button { border: none; background: none; color: var(--shell-mute); padding: 7px 13px; border-radius: 8px; font: inherit; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .3s ease, color .3s ease; }
  .theme-toggle button.on { background: #fff; color: #0b0d12; }


  /* hamburger + collapsible top nav */
  .hamburger { display: none; width: 44px; height: 40px; border: 1px solid var(--shell-line); background: #14171f; color: #e8eaee; border-radius: 10px; font-size: 18px; cursor: pointer; align-items: center; justify-content: center; }
  .nav-collapse { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  @media (max-width: 860px) {
    .hamburger { display: flex; }
    .nav-collapse { position: absolute; top: calc(100% + 10px); left: 0; right: 0; flex-direction: column; align-items: stretch; gap: 12px; background: #0f1219; border: 1px solid var(--shell-line); border-radius: 14px; padding: 14px; box-shadow: 0 22px 50px rgba(0,0,0,.55); display: none; z-index: 130; }
    .nav-collapse.open { display: flex; animation: fade .2s ease; }
    .dir-tabs { flex-direction: column; }
    .dir-tab { justify-content: flex-start; }
    .theme-toggle { align-self: center; }
    .brand span { display: none; }
  }

  /* in-app header hamburger (mobile) */
  .ah .burger { display: none; width: 36px; height: 34px; border: var(--chip-border); background: var(--chip-bg); color: var(--ink); border-radius: var(--pill-radius); font-size: 15px; cursor: pointer; align-items: center; justify-content: center; }
  @media (max-width: 640px) {
    .app .ah { position: relative; flex-wrap: wrap; row-gap: 10px; }
    .app .ah .burger { display: flex; margin-left: auto; order: 2; }
    .app .ah .wallet { order: 3; margin-left: 8px; }
    .app .ah .netbtn { display: none; }
    .app .ah nav { display: none; order: 4; width: 100%; flex-direction: column; gap: 2px; margin: 6px 0 0; padding-top: 10px; border-top: 1px solid var(--divider); }
    .app .ah.navopen nav { display: flex; }
    .app .pagehead h1 { font-size: 32px; }
    .app .iorow input { font-size: 22px; }
    .panel .intro h2 { font-size: 26px; }
  }

  .stage { max-width: 1360px; margin: 0 auto; padding: clamp(20px,4vw,40px) clamp(16px,4vw,40px) 120px; }
  .panel { display: none; animation: fade .35s ease; }
  .panel.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* intro */
  .intro { display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 26px; padding-bottom: 24px; border-bottom: 1px solid var(--shell-line); }
  .intro .kicker { font-family: 'JetBrains Mono',monospace; font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--shell-mute); margin-bottom: 10px; }
  .intro h2 { font-size: clamp(26px,4vw,40px); letter-spacing: -.02em; line-height: 1.05; margin-bottom: 10px; }
  .intro p { color: #aab0be; max-width: 640px; font-size: 14.5px; line-height: 1.65; }
  .intro .meta { min-width: 230px; }
  .intro .meta-row { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px dashed var(--shell-line); font-size: 12.5px; }
  .intro .meta-row span:first-child { color: var(--shell-mute); }
  .intro .meta-row span:last-child { color: #d3d7e0; font-weight: 600; text-align: right; }

  .frame { border-radius: 22px; overflow: hidden; border: 1px solid rgba(255,255,255,.08); box-shadow: 0 30px 80px rgba(0,0,0,.4); }

  /* themed root */
  .app { font-family: var(--font-body); background: var(--bg); color: var(--ink); position: relative; transition: background .3s ease, color .3s ease; }
  .app::before { content: ''; position: absolute; inset: 0; pointer-events: none; background: var(--bg-fx); z-index: 0; }
  .app > * { position: relative; z-index: 1; }

  /* header */
  .ah { display: flex; align-items: center; gap: 14px; padding: 15px clamp(16px,3vw,26px); border-bottom: var(--hdr-border); background: var(--hdr-bg); backdrop-filter: blur(10px); }
  .ah .logo { display: flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 700; font-size: 18px; letter-spacing: var(--display-ls); color: var(--ink); }
  .ah .logo .mark { width: 26px; height: 26px; border-radius: var(--mark-radius); background: var(--accent-grad); display: grid; place-items: center; font-size: 13px; color: var(--on-accent); font-weight: 800; box-shadow: var(--glow-sm); }
  .ah nav { display: flex; gap: 3px; margin-left: 6px; flex-wrap: wrap; }
  .ah nav a { padding: 8px 12px; border-radius: var(--pill-radius); font-size: 13px; font-weight: 600; color: var(--mute); transition: all .16s; cursor: pointer; }
  .ah nav a:hover { color: var(--ink); background: var(--hover-bg); }
  .ah nav a.on { color: var(--nav-on-ink); background: var(--nav-on-bg); box-shadow: var(--nav-on-shadow); }
  .ah .wallet { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .ah .netbtn { display: flex; align-items: center; gap: 7px; padding: 8px 12px; border-radius: var(--pill-radius); font-size: 12.5px; font-weight: 600; color: var(--ink); background: var(--chip-bg); border: var(--chip-border); }
  .ah .netbtn .g { width: 7px; height: 7px; border-radius: 50%; background: #35d07f; box-shadow: 0 0 8px #35d07f; }
  .addr { font-family: var(--font-mono); font-size: 12.5px; }

  .body { padding: clamp(18px,3vw,30px); }
  .pagehead { margin-bottom: 22px; }
  .pagehead .eye { font-family: var(--font-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--accent-ink); margin-bottom: 8px; display: inline-flex; align-items: center; gap: 8px; }
  .pagehead .eye::before { content: ''; width: 20px; height: 1px; background: var(--accent-ink); display: inline-block; }
  .pagehead h1 { font-family: var(--font-display); font-size: clamp(28px,4.4vw,46px); font-weight: var(--display-weight); font-style: var(--display-style); letter-spacing: var(--display-ls); line-height: 1; color: var(--ink); }
  .pagehead p { color: var(--mute); margin-top: 10px; font-size: 14px; max-width: 520px; }

  .bento { display: grid; grid-template-columns: 1.12fr 1fr; gap: var(--gap); align-items: start; }
  @media (max-width: 900px) { .bento { grid-template-columns: 1fr; } }

  .card { background: var(--card-bg); border: var(--card-border); border-radius: var(--card-radius); box-shadow: var(--card-shadow); backdrop-filter: var(--card-blur); padding: var(--card-pad); }
  .card-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
  .card-h .t { font-family: var(--font-display); font-weight: var(--card-title-weight); font-style: var(--card-title-style); font-size: 17px; letter-spacing: var(--display-ls); color: var(--ink); }
  .gear { width: 32px; height: 32px; border-radius: var(--pill-radius); display: grid; place-items: center; color: var(--mute); background: var(--chip-bg); border: var(--chip-border); cursor: pointer; transition: all .18s; font-size: 15px; }
  .gear:hover { color: var(--ink); transform: rotate(45deg); }

  /* segmented control */
  .seg { display: inline-flex; background: var(--seg-bg); border: var(--chip-border); border-radius: var(--btn-radius); padding: 3px; gap: 2px; }
  .seg button { border: none; background: none; color: var(--mute); padding: 7px 15px; border-radius: calc(var(--btn-radius) - 3px); font: inherit; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .15s; }
  .seg button.on { background: var(--seg-on-bg); color: var(--seg-on-ink); box-shadow: var(--seg-on-shadow); }

  /* swap io */
  .swapio { display: flex; flex-direction: column; gap: 6px; position: relative; }
  .iorow { background: var(--io-bg); border: var(--io-border); border-radius: var(--io-radius); padding: 15px 16px; transition: border-color .18s, box-shadow .18s; }
  .iorow:focus-within { border-color: var(--accent-ink); box-shadow: var(--focus-ring); }
  .iorow .lbl { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--mute); margin-bottom: 10px; }
  .iorow .lbl .bal { cursor: pointer; }
  .iorow .lbl .bal b { color: var(--accent-ink); margin-left: 4px; }
  .iorow .main { display: flex; align-items: center; gap: 12px; }
  .iorow input { flex: 1; background: none; border: none; outline: none; color: var(--ink); font-family: var(--font-mono); font-size: 26px; font-weight: 600; letter-spacing: -.01em; min-width: 0; width: 100%; }
  .iorow .fiat { font-size: 11.5px; color: var(--mute); margin-top: 6px; font-family: var(--font-mono); }
  .tokpill { display: flex; align-items: center; gap: 8px; padding: 7px 12px 7px 8px; border-radius: var(--tok-radius); background: var(--tok-bg); border: var(--tok-border); font-weight: 700; font-size: 14px; color: var(--tok-ink); cursor: pointer; white-space: nowrap; transition: transform .12s; }
  .tokpill:hover { transform: translateY(-1px); }
  .tokpill .ic { width: 24px; height: 24px; border-radius: 50%; display: grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; }
  .tokpill .cv { font-size: 10px; opacity: .55; }
  .swaparrow { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 40px; height: 40px; border-radius: var(--arrow-radius); background: var(--arrow-bg); border: var(--arrow-border); color: var(--arrow-ink); display: grid; place-items: center; cursor: pointer; z-index: 3; font-size: 16px; transition: transform .28s ease; box-shadow: var(--arrow-shadow); }
  .swaparrow:hover { transform: translate(-50%,-50%) rotate(180deg); }

  /* MEV toggle row */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin: 16px 2px; font-size: 13px; }
  .toggle-row .lft { display: flex; align-items: center; gap: 8px; color: var(--ink); font-weight: 600; }
  .toggle-row .lft .tag { font-size: 9.5px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: var(--accent-soft); color: var(--accent-ink); letter-spacing: .04em; }
  .switch { width: 44px; height: 26px; border-radius: 999px; background: var(--switch-off); position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; }
  .switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.35); }
  .switch.on { background: var(--switch-on); }
  .switch.on::after { transform: translateX(18px); }

  .slip { display: flex; align-items: center; gap: 8px; margin: 14px 0; flex-wrap: wrap; }
  .slip .lab { font-size: 12px; color: var(--mute); margin-right: 2px; }
  .pill { cursor: pointer; padding: 6px 12px; border-radius: var(--pill-radius); font-size: 12.5px; font-weight: 600; background: var(--chip-bg); border: var(--chip-border); color: var(--mute); transition: all .15s; }
  .pill:hover { color: var(--ink); }
  .pill.on { background: var(--accent-soft); color: var(--accent-ink); border-color: var(--accent-ink); }

  /* transaction preview (clarity) */
  .txprev { background: var(--preview-bg); border: var(--io-border); border-radius: var(--io-radius); padding: 13px 15px; margin: 14px 0; }
  .txprev .row { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; padding: 5px 0; }
  .txprev .row .k { color: var(--mute); display: flex; align-items: center; gap: 5px; }
  .txprev .row .v { font-family: var(--font-mono); font-weight: 600; color: var(--ink); }

  /* buttons */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; font-family: var(--font-body); font-weight: 700; font-size: 15px; border: none; transition: transform .12s, box-shadow .2s, background .2s, filter .2s; user-select: none; }
  .btn:active { transform: var(--btn-active); }
  .btn-lg { width: 100%; padding: 16px; border-radius: var(--btn-radius); font-size: 16px; }
  .btn-primary { background: var(--accent-grad); color: var(--on-accent); border: var(--btn-primary-border); box-shadow: var(--btn-primary-shadow); }
  .btn-primary:hover { box-shadow: var(--btn-primary-hover-shadow); filter: brightness(1.04); }
  .btn-secondary { background: var(--sec-bg); color: var(--sec-ink); border: var(--sec-border); box-shadow: var(--sec-shadow); padding: 12px 18px; border-radius: var(--btn-radius); }
  .btn-secondary:hover { filter: brightness(1.06); }
  .btn-ghost { background: transparent; color: var(--ink); border: var(--ghost-border); padding: 12px 18px; border-radius: var(--btn-radius); }
  .btn-ghost:hover { background: var(--hover-bg); }
  .btn-danger { background: var(--danger-bg); color: var(--danger-ink); border: var(--danger-border); padding: 12px 18px; border-radius: var(--btn-radius); }
  .btn[disabled] { opacity: .4; cursor: not-allowed; filter: grayscale(.3); box-shadow: none; }
  .btn[disabled]:active { transform: none; }
  .spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.35); border-top-color: currentColor; border-radius: 50%; animation: sp .7s linear infinite; }
  @keyframes sp { to { transform: rotate(360deg); } }

  /* portfolio + stats */
  .pcard .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .pcard .lab { font-size: 11.5px; color: var(--mute); text-transform: uppercase; letter-spacing: .06em; font-family: var(--font-mono); }
  .pcard .big { font-family: var(--font-mono); font-size: 30px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; margin-top: 6px; }
  .chgchip { font-size: 12px; font-weight: 700; padding: 4px 9px; border-radius: 999px; background: rgba(46,189,133,.14); color: #2ebd85; }
  .chart { margin-top: 10px; }
  .chartlegend { display: flex; gap: 6px; margin-top: 8px; }
  .chartlegend span { font-size: 10.5px; color: var(--mute); padding: 3px 8px; border-radius: 6px; cursor: pointer; }
  .chartlegend span.on { color: var(--accent-ink); background: var(--accent-soft); font-weight: 700; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); margin-top: var(--gap); }
  .stat { background: var(--card-bg); border: var(--card-border); border-radius: var(--card-radius); box-shadow: var(--card-shadow); backdrop-filter: var(--card-blur); padding: 15px 16px; }
  .stat .k { font-size: 11px; color: var(--mute); letter-spacing: .04em; text-transform: uppercase; margin-bottom: 7px; font-family: var(--font-mono); }
  .stat .v { font-family: var(--font-mono); font-size: 21px; font-weight: 700; color: var(--ink); letter-spacing: -.01em; }
  .stat .d { font-size: 11.5px; margin-top: 4px; font-weight: 600; }
  .up { color: #2ebd85; } .down { color: #f6465d; }

  .lprow { display: flex; align-items: center; gap: 13px; }
  .lprow .icons { display: flex; }
  .lprow .icons .c { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--card-bg); display: grid; place-items: center; color: #fff; font-size: 10px; font-weight: 800; }
  .lprow .icons .c:nth-child(2) { margin-left: -10px; }
  .lprow .nm { font-weight: 700; font-size: 15px; }
  .lprow .sub { font-size: 12px; color: var(--mute); margin-top: 2px; }
  .aprbadge { margin-left: auto; text-align: right; }
  .aprbadge .n { font-family: var(--font-mono); font-weight: 800; font-size: 20px; color: var(--accent-ink); }
  .aprbadge .l { font-size: 10px; color: var(--mute); text-transform: uppercase; letter-spacing: .1em; }
  .kv { display: flex; justify-content: space-between; font-size: 13px; padding: 9px 0; border-bottom: 1px dashed var(--divider); }
  .kv:last-of-type { border-bottom: none; }
  .kv .k { color: var(--mute); } .kv .v { font-family: var(--font-mono); font-weight: 600; }
  .btnrow { display: flex; gap: 10px; margin-top: 14px; }
  .btnrow .btn { flex: 1; }

  /* showcase */
  .section-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--mute); margin: 30px 0 14px; display: flex; align-items: center; gap: 10px; }
  .section-sub::after { content: ''; flex: 1; height: 1px; background: var(--divider); }
  .gallery { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .badge { font-size: 10.5px; font-weight: 700; padding: 4px 10px; border-radius: 999px; letter-spacing: .03em; }
  .b-accent { background: var(--accent-soft); color: var(--accent-ink); }
  .b-gold { background: rgba(232,163,60,.16); color: #d99a3a; }
  .b-info { background: rgba(74,144,226,.16); color: #5ba0f0; }
  .tip { position: relative; cursor: help; border-bottom: 1px dotted var(--mute); font-size: 13px; color: var(--ink); }
  .tip::after { content: attr(data-tip); position: absolute; bottom: 135%; left: 50%; transform: translateX(-50%) translateY(4px); background: var(--tooltip-bg); color: var(--tooltip-ink); padding: 6px 10px; border-radius: 8px; font-size: 11px; white-space: nowrap; opacity: 0; pointer-events: none; transition: .15s; border: var(--chip-border); z-index: 20; box-shadow: 0 6px 18px rgba(0,0,0,.25); }
  .tip:hover::after { opacity: 1; transform: translateX(-50%); }

  .typo { display: grid; gap: 14px; }
  .typo .spec { border-bottom: 1px dashed var(--divider); padding-bottom: 14px; }
  .typo .spec .role { font-family: var(--font-mono); font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--mute); margin-bottom: 6px; }
  .typo .display { font-family: var(--font-display); font-weight: var(--display-weight); font-style: var(--display-style); font-size: 32px; letter-spacing: var(--display-ls); color: var(--ink); }
  .typo .bodyt { font-family: var(--font-body); font-size: 15px; color: var(--ink); line-height: 1.6; }
  .typo .monot { font-family: var(--font-mono); font-size: 15px; color: var(--ink); }

  .swatches { display: grid; grid-template-columns: repeat(auto-fill,minmax(118px,1fr)); gap: 10px; }
  .sw { border: var(--card-border); border-radius: 12px; overflow: hidden; background: var(--card-bg); }
  .sw .chip { height: 52px; }
  .sw .meta { padding: 8px 10px; }
  .sw .meta .nm { font-size: 11px; font-weight: 700; color: var(--ink); }
  .sw .meta .hx { font-family: var(--font-mono); font-size: 9.5px; color: var(--mute); margin-top: 2px; word-break: break-all; }

  .toast { position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%) translateY(20px); background: var(--card-bg); border: 1px solid #2ebd85; color: var(--ink); padding: 12px 18px; border-radius: 12px; font-size: 13.5px; font-weight: 600; display: flex; align-items: center; gap: 8px; opacity: 0; transition: all .3s; z-index: 30; box-shadow: 0 12px 40px rgba(0,0,0,.4); pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast .ck { color: #2ebd85; }

  .hint { margin-top: 24px; font-size: 12.5px; color: var(--shell-mute); line-height: 1.7; }
  .hint b { color: #c7cdd8; }

  /* ============================================================
     DIRECTION 1 — AURORA MINT
     ============================================================ */

      </div>

      <div class="toast js-toast"><span class="ck">✔</span> 트랜잭션 완료 · 861.42 USDT 수령</div>
    </div>
  </div>

  <div class="hint">💡 <b>확인:</b> 상단 <b>Dark / Light 토글</b>로 테마 전환 · <b>버튼 hover·클릭(눌림), 세그먼트(스왑/지정가/브릿지), MEV 스위치, 슬리피지 pill, 스왑 화살표(회전), 입력창 포커스(글로우), MAX, 툴팁, "스왑하기"(로딩→성공 토스트)</b> 를 직접 눌러보세요.</div>
  `;
}

const PAL_TOKENS = [["Canvas","--bg"],["Surface","--card-bg"],["Ink","--ink"],["Muted","--mute"],["Accent","--accent-ink"],["Line","--divider"]];
function renderPalette(app){
  const cs = getComputedStyle(app);
  const host = app.querySelector('.js-swatches');
  host.innerHTML = PAL_TOKENS.map(([nm,tok])=>{
    const val = cs.getPropertyValue(tok).trim();
    return `<div class="sw"><div class="chip" style="background:${val}"></div><div class="meta"><div class="nm">${nm}</div><div class="hx">${val}</div></div></div>`;
  }).join('');
}

const stage = document.getElementById('stage');
const panels = {};
let curTheme = 'dark';
Object.keys(DIRS).forEach((dir,i)=>{
  const el = document.createElement('div');
  el.className = 'panel' + (i===0?' active':'');
  el.dataset.panel = dir;
  el.innerHTML = panelHTML(dir);
  stage.appendChild(el);
  panels[dir] = el;
});
// initial palettes
requestAnimationFrame(()=>Object.values(panels).forEach(p=>renderPalette(p.querySelector('.app'))));

// direction tabs
document.getElementById('tabs').addEventListener('click', e=>{
  const b = e.target.closest('.dir-tab'); if(!b) return;
  document.querySelectorAll('.dir-tab').forEach(t=>t.classList.remove('active'));
  b.classList.add('active');
  Object.values(panels).forEach(p=>p.classList.remove('active'));
  panels[b.dataset.t].classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('navCollapse').classList.remove('open');
});

// theme toggle (global) — manual button
function setTheme(th){
  curTheme = th;
  document.querySelectorAll('#themeToggle button').forEach(x=>x.classList.toggle('on', x.dataset.th===th));
  document.querySelectorAll('.app').forEach(app=>{ app.dataset.theme = th; });
  requestAnimationFrame(()=>Object.values(panels).forEach(p=>renderPalette(p.querySelector('.app'))));
}

document.getElementById('themeToggle').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  setTheme(b.dataset.th);
});
// hamburger (mobile top nav)
document.getElementById('hamburger').addEventListener('click', ()=>{
  document.getElementById('navCollapse').classList.toggle('open');
});

// delegated interactions
stage.addEventListener('click', e=>{
  const app = e.target.closest('.app'); if(!app) return;
  const ahb = e.target.closest('.js-ahburger');
  if(ahb){ ahb.closest('.ah').classList.toggle('navopen'); return; }
  const navlink = e.target.closest('.ah nav a');
  if(navlink){ app.querySelectorAll('.ah nav a').forEach(a=>a.classList.remove('on')); navlink.classList.add('on'); app.querySelector('.ah').classList.remove('navopen'); return; }
  const seg = e.target.closest('.js-segbtn');
  if(seg){ seg.parentElement.querySelectorAll('.js-segbtn').forEach(s=>s.classList.remove('on')); seg.classList.add('on'); return; }
  const slip = e.target.closest('.js-slip');
  if(slip){ app.querySelectorAll('.js-slip').forEach(s=>s.classList.remove('on')); slip.classList.add('on'); return; }
  const sw = e.target.closest('.js-switch');
  if(sw){ sw.classList.toggle('on'); return; }
  const flip = e.target.closest('.js-flip');
  if(flip){ flip.style.transform='translate(-50%,-50%) rotate(540deg)'; setTimeout(()=>flip.style.transform='',400); return; }
  const mx = e.target.closest('.js-max');
  if(mx){ const inp = app.querySelector('.iorow input'); if(inp) inp.value='12,480.55'; return; }
  const go = e.target.closest('.js-swap');
  if(go){
    if(go.dataset.busy) return; go.dataset.busy='1';
    const orig = go.innerHTML; go.innerHTML='<span class="spin"></span> 처리 중…'; go.style.opacity='.85';
    setTimeout(()=>{
      go.innerHTML='✔ 완료!'; go.style.opacity='1';
      const toast = app.querySelector('.js-toast'); toast.classList.add('show');
      setTimeout(()=>{ toast.classList.remove('show'); go.innerHTML=orig; delete go.dataset.busy; }, 2200);
    }, 1300);
  }
});
</script>
